<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>3D Object</title>
    <script src='https://kit.fontawesome.com/a076d05399.js'></script>
    <link rel="stylesheet" href="css/style.css">

    <!--Imports a model-viewer JavaScript code -->
    <!--It helps to handle how the 3D Object would be displayed -->
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <script nomodule src="https://unpkg.com/@google/model-viewer/dist/model-viewer-legacy.js"></script>
</head>

<body>

    <header class="header">
        <div class="logo-wrapper">
            <model-viewer class="logo" camera-orbit="0deg 96.2deg 5m" autoplay ar ar-modes="webxr scene-viewer"
                src="./assets/logo.glb">
            </model-viewer>
        </div>
    </header>

</body>

</html>
