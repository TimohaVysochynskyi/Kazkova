<!DOCTYPE html>
<html lang="en">

	<title>Slider</title>
	<link rel="stylesheet" href="./css/slider.css">

<body>
	<div class="carousel-wrapper" data-gap="20">

			</div>

			</div>
			<div class="carousel__slide">
				<div class="carousel__slide-content"></div>
			</div>
		</figure>
		<nav>
			<button class="nav prev">prev<img src="./assets/arrow.png" alt="prev"></button>

		</nav>
	</div>

</html>
